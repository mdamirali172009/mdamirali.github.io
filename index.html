<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D MovieHub Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">3D<span>MOVIE</span></div>
        <div class="search-box">
            <input type="text" placeholder="Search movies...">
            <button><i class="fas fa-search"></i></button>
        </div>
    </nav>

    <section class="upload-section">
        <div class="glass-upload-box">
            <h2><i class="fas fa-upload"></i> Premium Upload</h2>
            <div class="input-group">
                <input type="text" id="mTitle" placeholder="Movie Name">
            </div>
            <div class="file-grid">
                <input type="file" id="mPoster" accept="image/*">
                <input type="file" id="mVideo" accept="video/*">
            </div>
            <button class="btn-3d" onclick="addMovie()">PUBLISH NOW</button>
        </div>
    </section>

    <div class="container">
        <h2 class="title">Latest 3D Collection</h2>
        <div class="movie-grid" id="movieList">
            </div>
    </div>

    <div class="video-overlay" id="videoOverlay">
        <div class="video-container">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <video id="mainPlayer" controls></video>
        </div>
    </div>

    <script>
        const movieList = document.getElementById('movieList');
        function addMovie() {
            const title = document.getElementById('mTitle').value;
            const poster = document.getElementById('mPoster').files[0];
            const video = document.getElementById('mVideo').files[0];

            if(!title || !poster || !video) { alert("সবগুলো ফাইল দিন!"); return; }

            const posterUrl = URL.createObjectURL(poster);
            const videoUrl = URL.createObjectURL(video);

            const card = document.createElement('div');
            card.className = 'movie-card-3d';
            card.innerHTML = `
                <div class="inner-card">
                    <img src="${posterUrl}">
                    <div class="info">
                        <h3>${title}</h3>
                        <button onclick="playMovie('${videoUrl}')">Watch</button>
                    </div>
                </div>
            `;
            movieList.prepend(card);
            alert("সফলভাবে ৩ডি লিস্টে যুক্ত হয়েছে!");
        }

        function playMovie(url) {
            document.getElementById('mainPlayer').src = url;
            document.getElementById('videoOverlay').style.display = 'flex';
        }
        function closePlayer() {
            document.getElementById('videoOverlay').style.display = 'none';
            document.getElementById('mainPlayer').pause();
        }
    </script>
</body>
</html>
