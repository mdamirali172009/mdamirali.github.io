<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="info">
        <h2>🎮 মাউস ইনপুট টেস্ট</h2>
        <p>Left Click: <span id="left">False</span></p>
        <p>Right Click: <span id="right">False</span></p>
        <p>Mouse Position: (<span id="x">0</span>, <span id="y">0</span>)</p>
    </div>

    <script src="input.js"></script>
    <script>
        const canvas = document.getElementById("gameCanvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Canvas-এ ক্লিক দেখানোর জন্য সাধারণ ড্রয়িং
        const ctx = canvas.getContext("2d");
        
        function draw() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#0f0";
            ctx.font = "30px Arial";
            ctx.fillText("3D/2D গেম এখানে আসবে", canvas.width/2 - 200, canvas.height/2);
            
            // Status Update
            document.getElementById("left").textContent = Input.mouse.left;
            document.getElementById("right").textContent = Input.mouse.right;
            document.getElementById("x").textContent = Input.mouse.x;
            document.getElementById("y").textContent = Input.mouse.y;
            
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
