<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Amin Ali | Global Photographer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Hind+Siliguri:wght@400;600&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #000; color: white; overflow-x: hidden; }
        
        /* গ্লোবাল ম্যাপ ও নিওন ইফেক্ট */
        .world-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1f1a 0%, #000 100%);
            z-index: -1;
        }
        .dot { position: absolute; border-radius: 50%; animation: blink 3s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.8); } }

        .glass-ui {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .neon-gradient {
            background: linear-gradient(90deg, #00ffcc, #007cf0, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div class="world-bg" id="map"></div>

    <div class="min-h-screen flex flex-col items-center justify-center px-6 py-10">
        
        <div class="text-center mb-8">
            <h1 class="neon-gradient text-5xl md:text-7xl font-bold tracking-tighter mb-4">MD AMIN ALI</h1>
            <p class="text-xs tracking-[0.5em] text-emerald-400 uppercase">Global Visual Storyteller</p>
        </div>

        <div class="flex gap-5 mb-12">
            <a href="https://www.facebook.com/amirali172009" target="_blank" class="w-14 h-14 glass-ui flex items-center justify-center text-blue-500 text-2xl hover:scale-110 transition"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/amirali172009" target="_blank" class="w-14 h-14 glass-ui flex items-center justify-center text-pink-500 text-2xl hover:scale-110 transition"><i class="fab fa-instagram"></i></a>
            <a href="https://x.com/mdamirali172009" target="_blank" class="w-14 h-14 glass-ui flex items-center justify-center text-white text-2xl hover:scale-110 transition"><i class="fab fa-x-twitter"></i></a>
            <a href="https://wa.me/8801840364137" target="_blank" class="w-14 h-14 glass-ui flex items-center justify-center text-green-500 text-2xl hover:scale-110 transition"><i class="fab fa-whatsapp"></i></a>
        </div>

        <div class="glass-ui w-full max-w-md p-10 relative">
            <h3 class="text-2xl font-bold mb-8 text-center text-white">রেজিস্ট্রেশন করুন</h3>
            
            <form id="contact-form" class="space-y-6">
                <input type="text" name="user_name" placeholder="আপনার নাম" required 
                class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-400 transition text-white">
                
                <input type="email" name="user_email" placeholder="ইমেইল অ্যাড্রেস" required 
                class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-400 transition text-white">
                
                <button type="submit" id="submit-btn" 
                class="w-full bg-gradient-to-r from-emerald-500 to-blue-600 py-4 rounded-2xl font-bold uppercase tracking-widest text-black hover:brightness-110 transition active:scale-95">
                    সাবমিট করুন
                </button>
            </form>
            <p id="response-msg" class="mt-6 text-center text-sm font-semibold"></p>
        </div>
    </div>

    <script>
        // ব্যাকগ্রাউন্ড ম্যাপ ডটস জেনারেটর
        const map = document.getElementById('map');
        const colors = ['#00ffcc', '#ff00ff', '#007cf0', '#ffff00'];
        for (let i = 0; i < 60; i++) {
            let dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.width = Math.random() * 4 + 'px';
            dot.style.height = dot.style.width;
            dot.style.top = Math.random() * 100 + '%';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.background = colors[Math.floor(Math.random() * colors.length)];
            dot.style.boxShadow = `0 0 10px ${dot.style.background}`;
            dot.style.animationDelay = Math.random() * 5 + 's';
            map.appendChild(dot);
        }

        // EmailJS Integration লজিক
        (function() {
            // আপনার EmailJS Public Key এখানে বসান
            emailjs.init("YOUR_PUBLIC_KEY"); 
        })();

        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('response-msg');

            btn.innerText = "পাঠানো হচ্ছে...";
            btn.disabled = true;

            // EmailJS এর মাধ্যমে ইমেইল পাঠানো
            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(function() {
                    msg.style.color = "#00ffcc";
                    msg.innerText = "আপনার ইমেইলটি সম্পূর্ণভাবে আমরা গ্রহণ করছি!";
                    btn.innerText = "সফল হয়েছে";
                    document.getElementById('contact-form').reset();
                }, function(error) {
                    msg.style.color = "#ff4d4d";
                    msg.innerText = "দুঃখিত! আবার চেষ্টা করুন।";
                    btn.innerText = "ব্যর্থ হয়েছে";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
