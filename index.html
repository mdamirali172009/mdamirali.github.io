<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret System</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: radial-gradient(circle at center, #020617, #000);
    overflow-x: hidden;
}

.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
}

.card {
    transition: 0.6s;
    transform-style: preserve-3d;
}

.card:hover {
    transform: rotateY(180deg) scale(1.05);
}

.inner {
    position: relative;
    width: 100%;
    height: 100%;
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
}

.back {
    transform: rotateY(180deg);
}

</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen">

<div class="text-center">

<h1 id="title" class="text-5xl font-bold mb-10"></h1>

<div id="cards" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>

</div>

<script>

// ================== ANTI DEBUG 😈 ==================
setInterval(() => {
    if (window.outerWidth - window.innerWidth > 200) {
        document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:50px;'>⚠️ Access Denied</h1>";
    }
}, 1000);


// ================== ENCODED REAL DATA 🔐 ==================
const secretData = [
    "RmFjZWJvb2s6aHR0cHM6Ly9mYi5jb20vWU9VUl9JRA==",
    "SW5zdGFncmFtOmh0dHBzOi8vaW5zdGFncmFtLmNvbS9ZT1VSX0lE",
    "V2hhdHNBcHA6ODgwMTcxMjM0NTY3OA==",
    "TW9iaWxlOjAxNzEyMzQ1Njc4"
];

// ================== FAKE DATA 😏 ==================
const fakeData = [
    "Facebook: error_loading",
    "Instagram: private_user",
    "WhatsApp: hidden",
    "Mobile: unknown"
];

// decode function
function decode(str) {
    return atob(str);
}

// random delay reveal
function revealData() {
    return new Promise(resolve => {
        setTimeout(() => {
            const real = secretData.map(decode);
            resolve(real);
        }, Math.random() * 2000 + 1000);
    });
}

// ================== UI GENERATE ==================
async function createUI() {

    document.getElementById("title").innerText = "Welcome System";

    const container = document.getElementById("cards");

    // first show fake
    fakeData.forEach(item => {
        const div = createCard(item);
        container.appendChild(div);
    });

    // then replace with real (smooth)
    const realData = await revealData();

    container.innerHTML = "";

    realData.forEach(item => {
        const div = createCard(item, true);
        container.appendChild(div);
    });
}

// ================== CARD ==================
function createCard(text, real=false) {

    const div = document.createElement("div");
    div.className = "card glass rounded-3xl p-6 h-40 cursor-pointer";

    const inner = document.createElement("div");
    inner.className = "inner";

    const front = document.createElement("div");
    front.className = "front flex items-center justify-center text-lg";
    front.innerText = real ? "🔐 Tap" : text;

    const back = document.createElement("div");
    back.className = "back flex items-center justify-center text-sm text-green-400";
    back.innerText = text;

    inner.appendChild(front);
    inner.appendChild(back);
    div.appendChild(inner);

    // click copy
    div.onclick = () => {
        if(real){
            navigator.clipboard.writeText(text);
            div.style.background = "green";
        }
    };

    return div;
}

// ================== TYPE EFFECT ==================
let nameText = "Md Amin Ali";
let i = 0;

function typeEffect() {
    if (i < nameText.length) {
        document.getElementById("title").innerHTML += nameText.charAt(i);
        i++;
        setTimeout(typeEffect, 80);
    }
}

typeEffect();
createUI();

</script>

</body>
</html>
